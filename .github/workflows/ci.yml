name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

      - name: TypeCheck
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm test

      - name: Build
        run: npm run build